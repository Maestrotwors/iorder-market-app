name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - run: bun run format:check
      - run: bun run lint

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - run: bun run test:web

  build-frontend:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - run: bun run ng build web

  build-backend:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v5
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - name: Typecheck microservices
        run: |
          cd microservices/api-gateway && bunx tsc --noEmit && echo "✓ api-gateway" && cd ../..
          cd microservices/products-service && bunx tsc --noEmit && echo "✓ products-service" && cd ../..
          cd microservices/auth-service && bunx tsc --noEmit && echo "✓ auth-service" && cd ../..

  security:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - run: bun audit || true

  # ---------------------------------------------------------------------------
  # E2E — build all services in Docker, run Playwright frontend tests
  # ---------------------------------------------------------------------------
  e2e:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and start services
        run: |
          docker compose -f infrastructure/docker/docker-compose.test.yml up -d --build --wait
        timeout-minutes: 10

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4200/ > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 3
          done
          echo "Frontend failed to start"
          docker compose -f infrastructure/docker/docker-compose.test.yml logs frontend
          exit 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Run E2E frontend tests
        run: bunx playwright test --config=e2e/playwright.config.ts
        env:
          CI: 'true'

      - name: Run API integration tests
        run: bun run test:api
        env:
          API_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Show service logs on failure
        if: failure()
        run: docker compose -f infrastructure/docker/docker-compose.test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f infrastructure/docker/docker-compose.test.yml down -v

  # ---------------------------------------------------------------------------
  # Gate — all checks must pass before merge
  # ---------------------------------------------------------------------------
  ci:
    if: always()
    needs: [lint, test, build-frontend, build-backend, security, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build-frontend.result }}" != "success" || \
                "${{ needs.build-backend.result }}" != "success" || \
                "${{ needs.e2e.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi

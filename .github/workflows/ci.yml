name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: bun install

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - run: bun run format:check
      - run: bun run lint

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - run: bun run test:web

  build-frontend:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - run: bun run ng build web

  build-backend:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lockb', '**/package.json') }}
      - name: Typecheck microservices
        run: |
          cd microservices/api-gateway && bunx tsc --noEmit && echo "✓ api-gateway" && cd ../..
          cd microservices/products-service && bunx tsc --noEmit && echo "✓ products-service" && cd ../..
          cd microservices/auth-service && bunx tsc --noEmit && echo "✓ auth-service" && cd ../..

  security:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.45'
      - run: bun audit || true

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install

      - name: Prettier
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun run test:web

name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iorder
          POSTGRES_PASSWORD: iorder_secret
          POSTGRES_DB: iorder_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://iorder:iorder_secret@localhost:5432/iorder_db

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun run test:web

      - name: Build frontend
        run: bunx ng build web

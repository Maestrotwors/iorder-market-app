version: '3.9'

# Standalone PostgreSQL — single database for all environments.
# Usage: docker compose -f infrastructure/docker/docker-compose.db.yml up -d
#
# Local dev:     localhost:5432
# Kubernetes:    host.minikube.internal:5432

services:
  postgres:
    image: postgres:16-alpine
    container_name: iorder-postgres
    env_file:
      - ../../.env.db
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_replication_slots=4'
      - '-c'
      - 'max_wal_senders=4'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

# E2E test environment — spins up all services + test database + runs tests
# Prerequisites: bun run env:generate
# Usage:
#   Full stack:     docker compose -f infrastructure/docker/docker-compose.test.yml up -d --build --wait
#   With E2E:       docker compose -f infrastructure/docker/docker-compose.test.yml --profile e2e up --build --abort-on-container-exit e2e-runner
#   Teardown:       docker compose -f infrastructure/docker/docker-compose.test.yml --profile e2e down -v

services:
  # ==================== Test Database ====================
  postgres:
    image: postgres:16-alpine
    env_file: ../../.env.test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_replication_slots=4'
      - '-c'
      - 'max_wal_senders=4'
      - '-c'
      - 'fsync=off'
      - '-c'
      - 'synchronous_commit=off'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 2s
      timeout: 2s
      retries: 15

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--requirepass', '$${REDIS_PASSWORD}']
    env_file: ../../.env.test
    tmpfs:
      - /data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$${REDIS_PASSWORD}', 'ping']
      interval: 2s
      timeout: 2s
      retries: 10

  # ==================== DB Migration ====================
  db-migrate:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: api-gateway
    entrypoint: ['sh', '-c', 'bunx prisma migrate deploy --schema=database/prisma/schema.prisma']
    env_file: ../../.env.test
    depends_on:
      postgres:
        condition: service_healthy

  # ==================== Microservices ====================
  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: auth-service
    env_file: ../../.env.test
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3002/health']
      interval: 3s
      timeout: 3s
      retries: 10

  products-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: products-service
    env_file: ../../.env.test
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 3s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: api-gateway
    ports:
      - '3000:3000'
    env_file: ../../.env.test
    environment:
      API_GATEWAY_HOST: '0.0.0.0' # override: bind to all interfaces
    depends_on:
      products-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 3s
      timeout: 3s
      retries: 10

  # ==================== Frontend ====================
  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-full
    ports:
      - '4200:80'
    env_file: ../../.env.test
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://127.0.0.1:80/ > /dev/null || exit 1']
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 15

  # ==================== E2E Test Runner ====================
  e2e-runner:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.e2e
    environment:
      CI: 'true'
    depends_on:
      frontend:
        condition: service_healthy
    profiles:
      - e2e

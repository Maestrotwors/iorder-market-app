# E2E test environment — spins up all backend services + PostgreSQL
# Usage: docker compose -f infrastructure/docker/docker-compose.test.yml up -d --wait

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iorder_test
      POSTGRES_USER: iorder
      POSTGRES_PASSWORD: iorder_secret
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iorder -d iorder_test']
      interval: 3s
      timeout: 3s
      retries: 10

  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: api-gateway
    ports:
      - '3000:3000'
    environment:
      API_GATEWAY_PORT: '3000'
      API_GATEWAY_HOST: '0.0.0.0'
      PRODUCTS_SERVICE_HOST: products-service
      PRODUCTS_SERVICE_PORT: '3001'
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: '3002'
      DATABASE_URL: postgresql://iorder:iorder_secret@postgres:5432/iorder_test
      JWT_SECRET: test-secret-must-be-32-chars-long!!
      NODE_ENV: test
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://localhost:4318'
    depends_on:
      products-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 3s
      timeout: 3s
      retries: 10

  products-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: products-service
    environment:
      PRODUCTS_SERVICE_PORT: '3001'
      DATABASE_URL: postgresql://iorder:iorder_secret@postgres:5432/iorder_test
      NODE_ENV: test
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://localhost:4318'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 3s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: auth-service
    environment:
      AUTH_SERVICE_PORT: '3002'
      DATABASE_URL: postgresql://iorder:iorder_secret@postgres:5432/iorder_test
      JWT_SECRET: test-secret-must-be-32-chars-long!!
      NODE_ENV: test
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://localhost:4318'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3002/health']
      interval: 3s
      timeout: 3s
      retries: 10

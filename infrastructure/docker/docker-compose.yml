version: '3.9'

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: iorder-postgres
    environment:
      POSTGRES_DB: iorder_db
      POSTGRES_USER: iorder
      POSTGRES_PASSWORD: iorder_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_replication_slots=4'
      - '-c'
      - 'max_wal_senders=4'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iorder -d iorder_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RedPanda ====================
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: iorder-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --advertise-schema-registry-addr internal://redpanda:8081,external://localhost:18081
    ports:
      - '18081:18081'
      - '18082:18082'
      - '19092:19092'
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== RedPanda Console ====================
  redpanda-console:
    image: redpandadata/console:latest
    container_name: iorder-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
    ports:
      - '8080:8080'
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'

volumes:
  postgres_data:
    driver: local
  redpanda_data:
    driver: local

# Infrastructure services (excluding PostgreSQL — see docker-compose.db.yml)
# Usage: docker compose -f infrastructure/docker/docker-compose.yml up -d

services:
  # ==================== RedPanda ====================
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: iorder-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_KAFKA_PORT:-19092}
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:${REDPANDA_KAFKA_PORT:-19092}
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:${REDPANDA_PROXY_PORT:-18082}
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:${REDPANDA_PROXY_PORT:-18082}
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:${REDPANDA_SCHEMA_PORT:-18081}
    ports:
      - '${REDPANDA_SCHEMA_PORT:-18081}:${REDPANDA_SCHEMA_PORT:-18081}'
      - '${REDPANDA_PROXY_PORT:-18082}:${REDPANDA_PROXY_PORT:-18082}'
      - '${REDPANDA_KAFKA_PORT:-19092}:${REDPANDA_KAFKA_PORT:-19092}'
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 15s
      timeout: 10s
      retries: 5

  # ==================== RedPanda Console ====================
  redpanda-console:
    image: redpandadata/console:latest
    container_name: iorder-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
    ports:
      - '${REDPANDA_CONSOLE_PORT:-8080}:8080'
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'

volumes:
  redpanda_data:
    driver: local

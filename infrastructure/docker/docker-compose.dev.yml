# Full development stack — all services in Docker
# Usage: docker compose -f infrastructure/docker/docker-compose.dev.yml up -d --build
# Frontend: http://localhost:4200, API: http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    container_name: iorder-dev-postgres
    environment:
      POSTGRES_DB: iorder_db
      POSTGRES_USER: iorder
      POSTGRES_PASSWORD: iorder_secret
    ports:
      - '5432:5432'
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_replication_slots=4'
      - '-c'
      - 'max_wal_senders=4'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iorder -d iorder_db']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: iorder-dev-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - '18081:18081'
      - '18082:18082'
      - '19092:19092'
    volumes:
      - dev_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:latest
    container_name: iorder-dev-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
        kafkaConnect:
          enabled: true
          clusters:
            - name: iorder-cdc
              url: "http://debezium:8083"
    ports:
      - '8080:8080'
    depends_on:
      redpanda:
        condition: service_healthy
      debezium:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    restart: unless-stopped

  # Init: create RedPanda topics + register Debezium connector
  cdc-init:
    image: redpandadata/redpanda:latest
    container_name: iorder-dev-cdc-init
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Creating RedPanda topics..."
        TOPICS="user.registered user.logged_in order.created order.status_changed order.cancelled payment.initiated payment.completed payment.failed product.created product.updated product.deleted stock.updated notification.send cdc.change"
        for topic in $$TOPICS; do
          rpk topic create "$$topic" --brokers redpanda:9092 --partitions 3 --replicas 1 2>/dev/null || true
        done
        echo "Topics created:"
        rpk topic list --brokers redpanda:9092

        echo "Waiting for Debezium Connect..."
        for i in $$(seq 1 60); do
          if wget -qO- http://debezium:8083/connectors > /dev/null 2>&1; then
            echo "Debezium is ready!"
            break
          fi
          sleep 5
        done

        echo "Registering PostgreSQL CDC connector (products table)..."
        wget -qO- --post-data='{"name":"iorder-products-cdc","config":{"connector.class":"io.debezium.connector.postgresql.PostgresConnector","database.hostname":"postgres","database.port":"5432","database.user":"iorder","database.password":"iorder_secret","database.dbname":"iorder_db","topic.prefix":"cdc","schema.include.list":"public","table.include.list":"public.products","plugin.name":"pgoutput","slot.name":"iorder_products_slot","publication.autocreate.mode":"all_tables","key.converter":"org.apache.kafka.connect.json.JsonConverter","key.converter.schemas.enable":"false","value.converter":"org.apache.kafka.connect.json.JsonConverter","value.converter.schemas.enable":"false","tombstones.on.delete":"false","transforms":"unwrap","transforms.unwrap.type":"io.debezium.transforms.ExtractNewRecordState","transforms.unwrap.drop.tombstones":"true","transforms.unwrap.delete.handling.mode":"rewrite"}}' \
          --header="Content-Type: application/json" \
          "http://debezium:8083/connectors" || echo "Connector registration failed (will retry on next restart)"

        echo "CDC init complete."
    depends_on:
      redpanda:
        condition: service_healthy
      debezium:
        condition: service_healthy
      postgres:
        condition: service_healthy

  debezium:
    image: debezium/connect:3.0.0.Final
    container_name: iorder-dev-debezium
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: iorder-cdc
      CONFIG_STORAGE_TOPIC: _debezium.configs
      OFFSET_STORAGE_TOPIC: _debezium.offsets
      STATUS_STORAGE_TOPIC: _debezium.status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - '8083:8083'
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8083/connectors']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: auth-service
    container_name: iorder-dev-auth
    environment:
      AUTH_SERVICE_PORT: '3002'
      RUNTIME: docker
      DATABASE_URL: postgresql://iorder:iorder_secret@postgres:5432/iorder_db
      JWT_SECRET: dev-secret-change-in-production
      REDPANDA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://localhost:4318'
      NODE_ENV: development
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3002/health']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  products-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: products-service
    container_name: iorder-dev-products
    environment:
      PRODUCTS_SERVICE_PORT: '3001'
      RUNTIME: docker
      DATABASE_URL: postgresql://iorder:iorder_secret@postgres:5432/iorder_db
      REDPANDA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://localhost:4318'
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: api-gateway
    container_name: iorder-dev-gateway
    environment:
      API_GATEWAY_PORT: '3000'
      API_GATEWAY_HOST: '0.0.0.0'
      PRODUCTS_SERVICE_HOST: products-service
      PRODUCTS_SERVICE_PORT: '3001'
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: '3002'
      RUNTIME: docker
      DATABASE_URL: postgresql://iorder:iorder_secret@postgres:5432/iorder_db
      JWT_SECRET: dev-secret-change-in-production
      REDPANDA_BROKERS: redpanda:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: 'http://localhost:4318'
      NODE_ENV: development
    ports:
      - '3000:3000'
    depends_on:
      products-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-full
    container_name: iorder-dev-frontend
    environment:
      API_GATEWAY_HOST: api-gateway
      API_GATEWAY_PORT: '3000'
    ports:
      - '4200:80'
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:80/ > /dev/null || exit 1']
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10
    restart: unless-stopped

volumes:
  dev_postgres_data:
    driver: local
  dev_redpanda_data:
    driver: local

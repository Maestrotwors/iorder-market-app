# Full development stack — all services in Docker
# Prerequisites: bun run env:generate
# Usage: docker compose -f infrastructure/docker/docker-compose.dev.yml up -d --build
# Frontend: http://localhost:4200, API: http://localhost:3000

services:
  postgres:
    image: postgres:16-alpine
    container_name: iorder-dev-postgres
    env_file: ../../.env.docker
    ports:
      - '5432:5432'
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'wal_level=logical'
      - '-c'
      - 'max_replication_slots=4'
      - '-c'
      - 'max_wal_senders=4'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: iorder-dev-redis
    command: ['redis-server', '--requirepass', '$${REDIS_PASSWORD}']
    env_file: ../../.env.docker
    ports:
      - '6379:6379'
    volumes:
      - dev_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '$${REDIS_PASSWORD}', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: iorder-dev-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - '18081:18081'
      - '18082:18082'
      - '19092:19092'
    volumes:
      - dev_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ['CMD', 'rpk', 'cluster', 'health']
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:latest
    container_name: iorder-dev-redpanda-console
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
        schemaRegistry:
          enabled: true
          urls: ["http://redpanda:8081"]
    ports:
      - '8080:8080'
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    restart: unless-stopped

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: auth-service
    container_name: iorder-dev-auth
    env_file: ../../.env.docker
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3002/health']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  products-service:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: products-service
    container_name: iorder-dev-products
    env_file: ../../.env.docker
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api-gateway:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.microservice
      args:
        SERVICE: api-gateway
    container_name: iorder-dev-gateway
    env_file: ../../.env.docker
    environment:
      API_GATEWAY_HOST: '0.0.0.0' # override: bind to all interfaces
    ports:
      - '3000:3000'
    depends_on:
      products-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend-full
    container_name: iorder-dev-frontend
    env_file: ../../.env.docker
    ports:
      - '4200:80'
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:80/ > /dev/null || exit 1']
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 10
    restart: unless-stopped

volumes:
  dev_postgres_data:
    driver: local
  dev_redis_data:
    driver: local
  dev_redpanda_data:
    driver: local

# iOrder Market — Default Values (Production)

global:
  environment: production
  namespace: iorder

# --- Frontend (Angular + Nginx) ---
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: iorder/frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources: {}

# --- API Gateway ---
apiGateway:
  replicaCount: 1
  image:
    repository: iorder/api-gateway
    tag: latest
    pullPolicy: IfNotPresent
  port: 3000
  resources: {}
  hpa:
    enabled: false

# --- Products Service ---
productsService:
  replicaCount: 3
  image:
    repository: iorder/products-service
    tag: latest
    pullPolicy: IfNotPresent
  port: 3001
  resources: {}
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilization: 70

# --- Auth Service ---
authService:
  replicaCount: 3
  image:
    repository: iorder/auth-service
    tag: latest
    pullPolicy: IfNotPresent
  port: 3002
  resources: {}
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilization: 70

# --- Database ---
# External database (takes precedence when enabled)
database:
  external:
    enabled: false
    # Full PostgreSQL connection URL (overrides all other DB settings)
    # Example: postgresql://user:password@rds-host.amazonaws.com:5432/iorder_db
    url: ""

# --- PostgreSQL (internal, deployed inside K8s) ---
# Disabled automatically when database.external.enabled=true
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  port: 5432
  database: iorder_db
  username: iorder
  password: iorder_secret
  storage:
    size: 10Gi
    storageClass: ""
  resources: {}

# --- RedPanda ---
redpanda:
  enabled: true
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: "v24.1.1"
    pullPolicy: IfNotPresent
  kafka:
    port: 19092
  schemaRegistry:
    port: 18081
  restProxy:
    port: 18082
  resources: {}

# --- RedPanda Console (UI) ---
redpandaConsole:
  enabled: true
  image:
    repository: redpandadata/console
    tag: "latest"
    pullPolicy: IfNotPresent
  resources: {}

# --- Secrets ---
secrets:
  jwtSecret: "change-me-in-production"
  databasePassword: "iorder_secret"

# --- Ingress ---
ingress:
  enabled: true
  className: nginx
  host: iorder.local
  annotations: {}

# --- Network Policies ---
networkPolicies:
  enabled: true

# --- PDB ---
pdb:
  enabled: true
  productsService:
    minAvailable: 2
  authService:
    minAvailable: 2

# --- Monitoring ---
monitoring:
  enabled: false

# --- Observability (Loki + Tempo) ---
observability:
  otlpEndpoint: "http://tempo.monitoring:4318"

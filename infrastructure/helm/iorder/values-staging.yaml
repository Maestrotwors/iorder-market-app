# iOrder Market — Staging Values

global:
  environment: staging
  namespace: iorder-staging

apiGateway:
  enabled: true
  replicaCount: 1
  image:
    pullPolicy: Always
  hpa:
    enabled: false

productsService:
  enabled: true
  replicaCount: 2
  image:
    pullPolicy: Always
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

authService:
  enabled: true
  replicaCount: 2
  image:
    pullPolicy: Always
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

# External database (optional for staging)
database:
  external:
    enabled: false

postgresql:
  storage:
    size: 5Gi

pdb:
  enabled: true
  frontend:
    minAvailable: 1
  apiGateway:
    minAvailable: 1
  productsService:
    minAvailable: 1
  authService:
    minAvailable: 1

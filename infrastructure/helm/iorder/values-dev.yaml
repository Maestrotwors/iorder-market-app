# iOrder Market — Dev / Minikube Values

global:
  environment: development
  namespace: iorder

# --- Frontend ---
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: iorder/frontend
    tag: latest
    pullPolicy: Never
  serviceType: LoadBalancer
  loadBalancerPort: 30080
  resources: {}

# --- API Gateway ---
apiGateway:
  replicaCount: 2
  image:
    repository: iorder/api-gateway
    tag: latest
    pullPolicy: Never
  resources: {}
  hpa:
    enabled: false

# --- Products Service ---
productsService:
  replicaCount: 3
  image:
    repository: iorder/products-service
    tag: latest
    pullPolicy: Never
  resources: {}
  hpa:
    enabled: false

# --- Auth Service ---
authService:
  replicaCount: 3
  image:
    repository: iorder/auth-service
    tag: latest
    pullPolicy: Never
  resources: {}
  hpa:
    enabled: false

# --- Database (use host Docker PostgreSQL) ---
database:
  external:
    enabled: true
    url: "postgresql://iorder:iorder_secret@host.minikube.internal:5432/iorder_db"

# --- PostgreSQL (disabled — using external host Docker container) ---
postgresql:
  enabled: false
  port: 5432
  database: iorder_db
  username: iorder
  resources: {}

# --- RedPanda ---
redpanda:
  resources: {}

# --- RedPanda Console ---
redpandaConsole:
  resources: {}

# --- Secrets ---
secrets:
  jwtSecret: "dev-secret-change-in-production-must-be-32-chars-long!!"
  databasePassword: "iorder_secret"

# --- Ingress ---
ingress:
  enabled: false

# --- DB Migrate ---
dbMigrate: false

# --- Network Policies ---
networkPolicies:
  enabled: false

# --- PDB ---
pdb:
  enabled: false

# --- Monitoring ---
monitoring:
  enabled: true

# --- Observability (Loki + Tempo) ---
observability:
  otlpEndpoint: "http://tempo.monitoring:4318"

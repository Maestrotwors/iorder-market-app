# iOrder Market — Production Values

global:
  environment: production
  namespace: iorder-prod

apiGateway:
  replicaCount: 1
  image:
    pullPolicy: Always
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilization: 70

productsService:
  replicaCount: 3
  image:
    pullPolicy: Always
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

authService:
  replicaCount: 3
  image:
    pullPolicy: Always
  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

# External database — set url via --set or secrets in CI/CD
database:
  external:
    enabled: true
    url: ""  # Override via: --set database.external.url=postgresql://...

# Internal PostgreSQL disabled (external DB used in production)
postgresql:
  enabled: false

ingress:
  enabled: true
  host: api.iorder.market
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

pdb:
  enabled: true
  productsService:
    minAvailable: 2
  authService:
    minAvailable: 2

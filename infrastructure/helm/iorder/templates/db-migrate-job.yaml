{{- if (hasKey .Values "dbMigrate" | ternary .Values.dbMigrate true) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "iorder.fullname" . }}-db-migrate
  labels:
    {{- include "iorder.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "iorder.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migrate
          image: "{{ .Values.productsService.image.repository }}:{{ .Values.productsService.image.tag }}"
          imagePullPolicy: {{ .Values.productsService.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              for i in $(seq 1 30); do
                if bunx prisma db execute --schema=database/prisma/schema.prisma --stdin <<< "SELECT 1" 2>/dev/null; then
                  echo "PostgreSQL is ready!"
                  break
                fi
                echo "Attempt $i: PostgreSQL not ready, waiting 5s..."
                sleep 5
              done
              echo "Running Prisma db push..."
              bunx prisma db push --schema=database/prisma/schema.prisma --accept-data-loss
              echo "Running seed..."
              bun database/scripts/seed.ts || echo "Seed skipped (non-critical)"
              echo "Database migration completed."
          env:
            - name: DATABASE_URL
              value: {{ include "iorder.databaseUrl" . | quote }}
            - name: JWT_SECRET
              value: {{ .Values.secrets.jwtSecret | quote }}
          resources: {}
{{- end }}

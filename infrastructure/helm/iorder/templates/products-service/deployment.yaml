apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iorder.fullname" . }}-products-service
  labels:
    {{- include "iorder.labels" . | nindent 4 }}
    {{- include "iorder.selectorLabels" (dict "service" "products-service" "context" .) | nindent 4 }}
spec:
  replicas: {{ .Values.productsService.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "iorder.selectorLabels" (dict "service" "products-service" "context" .) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "iorder.labels" . | nindent 8 }}
        {{- include "iorder.selectorLabels" (dict "service" "products-service" "context" .) | nindent 8 }}
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: products-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: products-service
          image: "{{ .Values.productsService.image.repository }}:{{ .Values.productsService.image.tag }}"
          imagePullPolicy: {{ .Values.productsService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.productsService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "iorder.fullname" . }}-config
            - secretRef:
                name: {{ include "iorder.fullname" . }}-secrets
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.productsService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productsService.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productsService.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.productsService.resources | nindent 12 }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

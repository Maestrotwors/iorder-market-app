{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "iorder.fullname" . }}-api-gateway
  labels:
    {{- include "iorder.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "iorder.selectorLabels" (dict "service" "api-gateway" "context" .) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
---
apiVersion: monitoring.coreos.com/v1

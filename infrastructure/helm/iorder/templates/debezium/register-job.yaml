{{- if .Values.debezium.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "iorder.fullname" . }}-debezium-register
  labels:
    {{- include "iorder.labels" . | nindent 4 }}
    app.kubernetes.io/component: debezium-register
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "iorder.labels" . | nindent 8 }}
        app.kubernetes.io/component: debezium-register
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for Debezium Connect..."
              for i in $(seq 1 60); do
                if curl -sf "http://{{ include "iorder.fullname" . }}-debezium:8083/connectors" > /dev/null 2>&1; then
                  echo "Debezium is ready!"
                  break
                fi
                echo "Attempt $i: waiting 5s..."
                sleep 5
              done

              echo "Registering PostgreSQL CDC connector..."
              curl -sf -X PUT \
                "http://{{ include "iorder.fullname" . }}-debezium:8083/connectors/iorder-postgres-cdc/config" \
                -H "Content-Type: application/json" \
                -d '{
                  "connector.class": "io.debezium.connector.postgresql.PostgresConnector",
                  "database.hostname": "{{ include "iorder.fullname" . }}-postgresql",
                  "database.port": "{{ .Values.postgresql.port }}",
                  "database.user": "{{ .Values.postgresql.username }}",
                  "database.password": "{{ .Values.secrets.databasePassword }}",
                  "database.dbname": "{{ .Values.postgresql.database }}",
                  "topic.prefix": "cdc",
                  "schema.include.list": "public",
                  "table.include.list": "public.user,public.session,public.account,public.verification,public.products",
                  "plugin.name": "pgoutput",
                  "publication.name": "iorder_cdc",
                  "slot.name": "iorder_cdc_slot",
                  "publication.autocreate.mode": "filtered",
                  "key.converter": "org.apache.kafka.connect.json.JsonConverter",
                  "key.converter.schemas.enable": false,
                  "value.converter": "org.apache.kafka.connect.json.JsonConverter",
                  "value.converter.schemas.enable": false,
                  "tombstones.on.delete": false,
                  "transforms": "unwrap",
                  "transforms.unwrap.type": "io.debezium.transforms.ExtractNewRecordState",
                  "transforms.unwrap.drop.tombstones": true,
                  "transforms.unwrap.delete.handling.mode": "rewrite"
                }'

              echo ""
              echo "Connector registered."
              curl -sf "http://{{ include "iorder.fullname" . }}-debezium:8083/connectors/iorder-postgres-cdc/status"
          resources: {}
{{- end }}

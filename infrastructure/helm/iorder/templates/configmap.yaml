{{- if .Values.sharedResources.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iorder.fullname" . }}-config
  labels:
    {{- include "iorder.labels" . | nindent 4 }}
data:
  # Service ports
  API_GATEWAY_PORT: {{ .Values.apiGateway.port | quote }}
  API_GATEWAY_HOST: "0.0.0.0"
  PRODUCTS_SERVICE_PORT: {{ .Values.productsService.port | quote }}
  PRODUCTS_SERVICE_HOST: "{{ include "iorder.fullname" . }}-products-service"
  AUTH_SERVICE_PORT: {{ .Values.authService.port | quote }}
  AUTH_SERVICE_HOST: "{{ include "iorder.fullname" . }}-auth-service"
  # Database
  DATABASE_URL: {{ include "iorder.databaseUrl" . | quote }}
  # RedPanda
  REDPANDA_BROKERS: {{ include "iorder.redpandaBrokers" . | quote }}
  # JWT
  JWT_EXPIRATION: "3600"
  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otlpEndpoint | quote }}
  # Environment
  NODE_ENV: {{ .Values.global.environment | quote }}
{{- end }}

{{- if .Values.sharedResources.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "iorder.fullname" . }}-secrets
  labels:
    {{- include "iorder.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.secrets.databasePassword | b64enc | quote }}
  {{- if and .Values.database .Values.database.external .Values.database.external.enabled .Values.database.external.url }}
  DATABASE_URL: {{ .Values.database.external.url | b64enc | quote }}
  {{- end }}
{{- end }}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iorder-market
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Maestrotwors/iorder-market-app.git
    # Track the latest RC tag — updated by argocd-watch.sh or manually
    targetRevision: main
    path: infrastructure/helm/iorder
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m

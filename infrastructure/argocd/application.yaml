# iOrder Market — Single ArgoCD Application
# Manages entire Helm chart as one release (matching existing 'iorder-market' release).
# To deploy a single service: open app in UI → select the Deployment → Sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iorder-market
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Maestrotwors/iorder-market-app.git
    targetRevision: main
    path: infrastructure/helm/iorder
    helm:
      releaseName: iorder-market
      valueFiles:
        - values.yaml
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
